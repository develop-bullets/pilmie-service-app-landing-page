# 8 feature blocks — canon order, locked (load-bearing).
# Focus reading (the differentiator) is moved to 2nd per store-listing.md canon.
features_title: Why readers love Pilmie
features:
  - icon: streak
    title: A reading habit that keeps going
    body: Check in once a day to grow your streak, set a yearly goal, and finish books one by one. Ten focused minutes counts as your check-in for the day.
  - icon: focus
    title: Focus reading, fully immersive
    body: Pick a book, start the timer, and stay in the page with calm ambient music. Reorder your playlist or shuffle it, and watch your focused time add up, session by session.
  - icon: shelf
    title: Your personal library
    body: Sort every book into Want to read, Reading, and Read, and track how far you've gone by page or percent. Revisit everything you've finished in a month-by-month reading journal.
  - icon: highlight
    title: Save the lines that stay with you
    body: Highlight your favorite sentences, revisit them anytime, and share them as beautiful cards.
  - icon: review
    title: Ratings and reviews
    body: Give each book a star rating and write an honest review. Browse other readers' reviews by latest or most loved.
  - icon: discover
    title: Find your next read
    body: A fresh "Today's book," mood-based collections, and the books people are reading right now.
  - icon: social
    title: Follow readers you trust
    body: Follow reviewers whose taste you love, and their new reviews gather on your home. Like and comment to keep the conversation going.
  - icon: year
    title: Look back on your year
    body: Turn your year of reading into a shareable card.

