# 機能7ブロック — キャノン順を固定。順序を変えないこと(load-bearing)。
features_title: Pilmieでできること
features:
  - icon: streak
    title: 読書習慣が続く
    body: 毎日チェックインして連続日数を伸ばそう。年間の読書目標を決めて、読み終えた本を記録できます。
  - icon: shelf
    title: あなただけの本棚
    body: すべての本を「読みたい」「読書中」「読了」で整理。読みかけの本もすぐに続きから。
  - icon: review
    title: レビューを書く・出会う
    body: 本を評価してレビューを書き、ほかの読者の感想を読めます。新着順・いいね順で並び替え。
  - icon: highlight
    title: 心に残った一行を残す
    body: お気に入りの文章をハイライトして、いつでも読み返し。美しいカードでシェアもできます。
  - icon: discover
    title: 次に読む本が見つかる
    body: 日替わりの「今日の本」、気分で選ぶテーマ、そして今みんなが読んでいる本。
  - icon: social
    title: 気になる読者をフォロー
    body: 好みの合うレビュアーをフォローすると、新しいレビューがホームに集まります。いいねやコメントで交流も。
  - icon: year
    title: 一年の読書をふり返る
    body: 今年読んだ本を、シェアできるカードに。

reader:
  title: すべての読者のために
  items:
    - ライト／ダークテーマ
    - 日本語・English・한국어に対応
    - 無料 — 広告も、サブスクも、アプリ内課金もありません

