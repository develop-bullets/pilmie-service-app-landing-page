# 機能8ブロック — キャノン順を固定。順序を変えないこと(load-bearing)。
# 差別化ポイントの集中読書を2番目に前進配置 (store-listing.md キャノン)。
features_title: Pilmieでできること
features:
  - icon: streak
    title: 続いていく読書習慣
    body: 一日一回のチェックインで連続日数を伸ばし、今年の目標を決めて一冊ずつ読み終えていきます。10分の集中読書は、その日のチェックインにもなります。
  - icon: focus
    title: 没入できる集中読書
    body: 読む本を選んでタイマーをオン。穏やかな環境音とともに、何にも邪魔されずページに集中できます。再生順を並べ替えたりシャッフルしたり、集中した時間はセッションごとに積み重なります。
  - icon: shelf
    title: あなただけの本棚
    body: すべての本を「読みたい」「読書中」「読了」で整理し、ページ数でもパーセントでも進み具合を記録。読み終えた本は月別の読書ノートでふり返れます。
  - icon: highlight
    title: 心に残った一行を残す
    body: お気に入りの文章をハイライトして、いつでも読み返し。美しいカードでシェアもできます。
  - icon: review
    title: 評価とレビュー
    body: 読んだ本に星をつけて、率直な感想を残します。ほかの読者のレビューも新着順・いいね順で楽しめます。
  - icon: discover
    title: 次に読む本が見つかる
    body: 日替わりの「今日の本」、気分で選ぶテーマ、そして今みんなが読んでいる本。
  - icon: social
    title: 気になる読者をフォロー
    body: 好みの合うレビュアーをフォローすると、新しいレビューがホームに集まります。いいねやコメントで交流も。
  - icon: year
    title: 一年の読書をふり返る
    body: 今年読んだ本を、シェアできるカードに。

