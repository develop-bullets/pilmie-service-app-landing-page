# 기능 7블록 — 캐논 순서 고정. 순서를 바꾸지 말 것 (load-bearing).
features_title: Pilmie에서 할 수 있는 것
features:
  - icon: streak
    title: 이어지는 독서 습관
    body: 매일 체크인하며 독서 연속일수를 쌓아보세요. 연간 목표를 정하고 완독한 책을 기록할 수 있어요.
  - icon: shelf
    title: 나만의 서재
    body: "모든 책을 '읽고 싶어요 · 읽는 중 · 읽음'으로 정리하고, 읽던 책은 바로 이어서."
  - icon: review
    title: 리뷰 쓰고 발견하기
    body: 별점과 함께 리뷰를 남기고, 다른 독자들의 리뷰를 만나보세요. 최신순·좋아요순으로 정렬할 수 있어요.
  - icon: highlight
    title: 마음에 남은 문장 수집
    body: 좋았던 문장을 하이라이트해 언제든 다시 보고, 예쁜 카드로 공유해요.
  - icon: discover
    title: 다음에 읽을 책 발견
    body: "매일 바뀌는 '오늘의 책', 기분 따라 고르는 테마, 지금 사람들이 읽고 있는 책까지."
  - icon: social
    title: 마음 맞는 독자 팔로우
    body: 취향이 통하는 리뷰어를 팔로우하면 새 리뷰가 홈에 모여요. 좋아요와 댓글로 함께 이야기 나눠요.
  - icon: year
    title: 한 해의 독서 돌아보기
    body: 올해 읽은 책을 공유 카드로 만들어보세요.

reader:
  title: 모든 독자를 위해
  items:
