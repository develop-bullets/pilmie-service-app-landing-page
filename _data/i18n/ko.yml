hero:
  headline: Pilmie에서 함께 읽어요          # 캐논 슬로건
  sub: 독서를 기록하고, 연속일수를 쌓고, 리뷰를 나누는 독서 커뮤니티   # 캐논 한 줄 소개
  lede: 읽고 싶은 마음은 그대로, 끝까지 읽는 습관까지. Pilmie는 읽은 책을 기록하고, 방해 없이 몰입해 읽고, 마음에 닿은 문장과 리뷰를 함께 나누는 독서 앱이에요.   # Description 훅
  # "무료"(다운로드 시점의 사실)만 노출한다. "광고 없음 · 구독 없음 · 인앱 결제 없음"
  # 같은 향후 약속은 넣지 말 것 — 수익화 여지를 막는다.
  meta: 무료 · iOS 16+ / Android
  mascot_alt: Pilmie 마스코트

