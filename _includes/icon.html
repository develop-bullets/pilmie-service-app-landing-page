{%- comment -%}
인라인 SVG 아이콘. FontAwesome CDN 대체.
사용: {% include icon.html name="streak" %}  (name 필수)
24x24, stroke=currentColor. 색은 부모의 color를 상속.
{%- endcomment -%}

<svg class="icon icon--{{ n }}" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">

<circle cx="12" cy="13" r="7"/><path d="M12 13V9.5"/><path d="M9.5 2.5h5"/><path d="M12 2.5V6"/><path d="M19 7.5l1.4-1.4"/>
