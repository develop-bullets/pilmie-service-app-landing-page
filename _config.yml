####################################################
### 사이트 메타 — seo-tag / sitemap이 참조         ###
####################################################

url: https://pilmie.com          # 절대 URL 생성에 필수 (seo-tag · sitemap)
baseurl: ""

title: Pilmie
description: "독서를 기록하고, 연속일수를 쌓고, 리뷰를 나누는 독서 커뮤니티"
lang: ko
logo: /assets/brand/icon-512.png

twitter:
  username: pilmieofficial
  card: summary_large_image

social:
  name: Pilmie
  links:
    - https://instagram.com/pilmie.official
    - https://x.com/pilmieofficial
    - https://youtube.com/@pilmie.official

####################################################
### 앱 / 스토어 — URL 하드코딩(런타임 조회 없음)     ###
####################################################

app:
  ios_id: "6749807731"
  ios_url: https://apps.apple.com/app/id6749807731
  android_id: kr.co.bullets.pilmie
  android_url: https://play.google.com/store/apps/details?id=kr.co.bullets.pilmie
  ios_min: "16.0"
  android_min_sdk: "28"

company:
  name: Bullets
  email: develop@bullets.co.kr

enable_smart_app_banner: true

####################################################
### 다국어 (플러그인 없이 — GH Pages 레거시 빌드)   ###
####################################################
#
# 홈 문자열: _data/i18n/{ko,en,ja}.yml  (원본 = 앱 repo docs/store-listing.md 캐논)
# hreflang·언어 전환기: _data/alternates.yml
#
# 정책 페이지(_pages/*.md)는 앱 repo의 docs/legal/sync-landing-pages.sh가 생성하며
# front matter로 layout/title/include_in_header만 넘긴다. lang/image/description은
# 아래 glob 스코프로 주입한다 — front matter가 defaults를 이기므로 스크립트를
# 다시 돌려도 변화가 없다(계약). 스크립트 수정 불필요.

defaults:
  - scope:
      path: ""
    values:
      lang: ko
      image: /assets/og/og-ko.png
  - scope:
      path: "_pages/*-en.md"
    values:
      lang: en
      image: /assets/og/og-en.png
      description: "Log your reading, build streaks, and share book reviews with fellow readers."
  - scope:
      path: "_pages/*-ja.md"
    values:
      lang: ja
      image: /assets/og/og-ja.png
      description: "読書を記録して連続日数を伸ばし、本のレビューを読書仲間とシェア。"

####################################################
### Jekyll                                       ###
####################################################

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

sass:
  sass_dir: _sass
  style: compressed

collections:
  pages:
    output: true
    permalink: /:path/

markdown: kramdown

# CNAME은 제외하지 않는다 — _site에 포함돼야 커스텀 도메인이 자기기술적으로 살아남는다
# (현재는 repo Pages 설정에만 의존 → 설정이 초기화되면 복구할 파일 없이 도메인이 죽음).
exclude:
  - LICENSE
  - NOTICE.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - tool/
