####################################################
### Jekyll Configuration. No need to touch this. ###
####################################################

# Set the Sass partials directory, as we're using @imports
sass:
  style: :compressed # You might prefer to minify using :compressed

# Exclude these files from your production _site
# CNAME은 제외하지 않는다 — _site에 포함돼야 커스텀 도메인이 자기기술적으로 살아남는다
# (현재는 repo Pages 설정에만 의존 → 설정 초기화 시 복구 파일 없이 도메인이 죽음).
exclude:
  - LICENSE
  - README.md
  - Gemfile
  - Gemfile.lock

collections:
  pages:
    output: true
    permalink: /:path/

# Markdown rendering
markdown: kramdown
