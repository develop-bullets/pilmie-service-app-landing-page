#page title
page_title                                : Pilmie                                    # Automatically populates with app name if not set and if iOS app ID is set. Otherwise enter manually.

# App Info
ios_app_id                                : 6749807731                                # Required. Enter iOS app ID to automatically populate name, price and icons (e.g. 718043190).
ios_app_country                           : kr                                        # Required outside USA. Enter 2 letter country code as in https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2

appstore_link                             : https://apps.apple.com/app/id6749807731   # Hardcoded so crawlers see it (was runtime-filled by jQuery JSONP → dead for bots).
playstore_link                            : https://play.google.com/store/apps/details?id=kr.co.bullets.pilmie                                          # Enter Google Play Store URL.
presskit_download_link                    :                                           # Enter a link to downloadable file or (e.g. public Dropbox link to a .zip file).
                                                                                      # Or upload your press kit file to assets and set path accordingly (e.g. "assets/your_press_kit.zip").

app_icon                                  : assets/app-icon.png                       # Automatically populates if not set and if iOS app ID is set.  Otherwise enter path to icon file manually.
app_name                                  : Pilmie                                    # Automatically populates if not set and if iOS app ID is set.  Otherwise enter manually.
app_price                                 : Find your favorite books                  # Automatically populates if not set and if iOS app ID is set.  Otherwise enter manually.
app_description                           : Get honest and insightful reviews from book lovers.

enable_smart_app_banner                   : true                                      # Set to true to show a smart app banner at top of page on mobile devices.

canonical_url                             : https://pilmie.com
og_image                                  :

####################################################
### Site infra — SEO / i18n / plugins (PR1)      ###
####################################################

# seo-tag / sitemap이 절대 URL을 만들려면 필수.
url                                       : https://pilmie.com
baseurl                                   : ""

# seo-tag가 참조하는 사이트 메타. (page_title은 구 템플릿 head가 쓰던 키 — seo-tag는 title/description을 본다.)
title                                     : Pilmie
description                               : "독서를 기록하고, 연속일수를 쌓고, 리뷰를 나누는 독서 커뮤니티"
lang                                      : ko
logo                                      : /assets/app-icon.png

twitter:
  username                                : pilmieofficial
  card                                    : summary_large_image

social:
  name                                    : Pilmie
  links:
    - https://instagram.com/pilmie.official
    - https://x.com/pilmieofficial
    - https://youtube.com/@pilmie.official

# 앱/스토어 정보 (하드코딩 — 런타임 JSONP 조회 제거)
app:
  ios_id                                  : "6749807731"
  ios_url                                 : https://apps.apple.com/app/id6749807731
  android_id                              : kr.co.bullets.pilmie
  android_url                             : https://play.google.com/store/apps/details?id=kr.co.bullets.pilmie
  ios_min                                 : "16.0"
  android_min_sdk                         : "28"

company:
  name                                    : Bullets
  email                                   : develop@bullets.co.kr

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# 정책 페이지(_pages/*.md)는 sync-landing-pages.sh가 생성하며 lang을 넣지 않는다.
# glob 스코프로 lang/og image를 주입 — front matter가 defaults를 이기므로 스크립트 재실행 시 변화 없음.
defaults:
  - scope:
      path: ""
    values:
      lang: ko
  - scope:
      path: "_pages/*-en.md"
    values:
      lang: en
      description: "Log your reading, build streaks, and share book reviews with fellow readers."
  - scope:
      path: "_pages/*-ja.md"
    values:
      lang: ja
      description: "読書を記録して連続日数を伸ばし、本のレビューを読書仲間とシェア。"

